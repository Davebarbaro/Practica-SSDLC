version: '3.8'

services:
  # NGINX - Servidor web frontend con HTTPS
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: lab-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - lab-network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./programacion-segura-skeleton-main
      dockerfile: Dockerfile
    container_name: lab-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      # Solo logs persistentes - La BD NO persiste (se borra cada vez)
      - logs-data:/app/logs
    networks:
      - lab-network
    restart: unless-stopped

  # SQLite Database (sin persistencia - se borra cada vez)
  # Este servicio ya no es necesario pero lo dejamos por compatibilidad
  database:
    image: alpine:latest
    container_name: lab-database
    networks:
      - lab-network
    command: tail -f /dev/null

# Redes
networks:
  lab-network:
    driver: bridge
    name: lab-network

# Volúmenes persistentes (solo logs - BD NO persiste)
volumes:
  logs-data:
    name: lab-logs-data  # A09:2021 - Persistencia de logs de seguridad
